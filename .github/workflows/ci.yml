name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  unit:
    name: Unit Tests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - run: go mod verify
      - run: go mod tidy
      - run: go generate ./...
      - name: Check for uncommitted changes in docs/ after generate
        run: git diff --exit-code docs/
      - run: go fmt ./...
      - run: go vet ./...
      - run: go tool staticcheck ./...

      - name: Run unit tests
        run: go test -v -race ./...

  acceptance:
    name: Acceptance Tests
    if: github.event_name == 'push'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"

      - name: Run go mod verify
        run: go mod verify

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          PHARE_ORG_API_KEY: ${{ secrets.PHARE_ORG_API_KEY }}
          PHARE_PRJ_API_KEY: ${{ secrets.PHARE_PRJ_API_KEY }}
        run: go test -v -race ./...
