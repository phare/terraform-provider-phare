name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  unit:
    name: Unit Tests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - run: go mod verify
      - run: go mod tidy
      - run: go generate ./...
      - name: Check for uncommitted changes in docs/ after generate
        run: git diff --exit-code docs/
      - run: go fmt ./...
      - run: go vet ./...
      - run: go tool staticcheck ./...

      - name: Run unit tests
        run: go test -v -race ./...

  acceptance:
    name: Acceptance Tests
    if: github.event_name == 'push'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - run: go mod verify

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          PHARE_ORG_API_KEY: ${{ secrets.PHARE_ORG_API_KEY }}
          PHARE_PRJ_API_KEY: ${{ secrets.PHARE_PRJ_API_KEY }}
        run: go test -v -race ./...
